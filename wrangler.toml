# Cloudflare Pages sẽ đọc cấu hình build output từ đây.
# Astro mặc định build ra thư mục `dist`.
pages_build_output_dir = "dist"

# KV namespace cho data (users, challenges, records, metadata)
[[kv_namespaces]]
binding = "DATA"
